version: 2
updates:
  # Actions pins
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    ignore:
      # Pinned to v5 — v6 introduces a duplicate Authorization header bug
      # (actions/checkout#2299, tracked ISI-855). Remove once upstream fixes it.
      - dependency-name: "actions/checkout"
        versions: [">=6"]

  # Go module
  - package-ecosystem: gomod
    directory: /gatewayapiprocessor
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - go
    groups:
      otel:
        patterns:
          - "go.opentelemetry.io/*"
          - "github.com/open-telemetry/*"
      k8s:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"

  # Docker base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
