name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_DIR: gatewayapiprocessor
  COVERAGE_WARN: 80
  COVERAGE_FAIL: 70

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # OTEL Collector v0.150 requires Go 1.25. Run the matrix on 1.25 only —
        # lower minors will auto-bump via GOTOOLCHAIN=auto anyway, but pinning
        # the reported version keeps CI logs readable.
        go: ['1.25']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.sum

      - name: go vet
        working-directory: ${{ env.MODULE_DIR }}
        run: go vet ./...

      - name: go test (race + coverage)
        working-directory: ${{ env.MODULE_DIR }}
        run: |
          go test ./... \
            -race \
            -covermode=atomic \
            -coverprofile=coverage.out \
            -timeout=5m

      - name: Coverage gate (warn < ${{ env.COVERAGE_WARN }}%, fail < ${{ env.COVERAGE_FAIL }}%)
        working-directory: ${{ env.MODULE_DIR }}
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${pct}%"
          awk -v p="$pct" -v w="$COVERAGE_WARN" -v f="$COVERAGE_FAIL" 'BEGIN {
            if (p+0 < f+0) { print "::error::coverage " p "% below fail threshold " f "%"; exit 1 }
            else if (p+0 < w+0) { print "::warning::coverage " p "% below warn threshold " w "%" }
            else { print "coverage " p "% OK" }
          }'
          echo "COVERAGE_PCT=$pct" >> "$GITHUB_ENV"

      - name: Upload coverage artifact
        if: matrix.go == '1.25'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-go${{ matrix.go }}
          path: ${{ env.MODULE_DIR }}/coverage.out
          retention-days: 14

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # v2 required: v1.64.8 was built with Go 1.24 and rejects the Go 1.25
          # toolchain the repo pins (ISI-687). .golangci.yml migrated to v2 schema.
          version: v2.11.4
          working-directory: ${{ env.MODULE_DIR }}
          args: --timeout=5m

  build-ocb:
    name: OCB build (smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.sum

      - name: Install OCB
        run: |
          OCB_VERSION=$(grep -E '^\s*version:' builder-config.yaml | head -1 | awk '{print $2}' | cut -d- -f1)
          echo "Installing OCB v${OCB_VERSION}"
          go install go.opentelemetry.io/collector/cmd/builder@v${OCB_VERSION}

      - name: Build custom collector
        run: |
          builder --config=builder-config.yaml
          ls -lh _build/

      - name: Smoke-test binary (--help)
        run: |
          ./_build/otelcol-gatewayapi --help | head -20

  # ---------------------------------------------------------------------------
  # Security scans on PR + main. govulncheck, Trivy fs (vuln + secret +
  # misconfig), and source SBOM on main pushes.
  # ---------------------------------------------------------------------------
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: ${{ env.MODULE_DIR }}/go.sum

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.25'
          work-dir: ${{ env.MODULE_DIR }}

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trivy filesystem scan (vuln + secret, SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  sbom:
    name: SBOM (CycloneDX, source)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate source SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.source.cyclonedx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-source
          path: sbom.source.cyclonedx.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Demo-asset validation (per ISI-671 demo-risk §6).
  # CI does NOT run `make demo` — Henrik runs end-to-end in homelab. CI only
  # validates the assets so the homelab demo stays green.
  # ---------------------------------------------------------------------------
  manifest-lint:
    name: manifest-lint (yamllint + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install yamllint
        run: pipx install yamllint

      - name: yamllint deploy/
        run: yamllint -c .yamllint.yml deploy/

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform

      - name: kubeconform deploy/ (k8s + Gateway API CRDs)
        run: |
          # Validate full k8s manifests under deploy/ against k8s built-in
          # schemas + datreeio CRD catalog (Gateway API, OTel Operator, etc.).
          #
          # Excluded by design:
          #   *.snippet.yaml           — partial config fragments, not k8s objects
          #   deploy/**/helm/**        — Helm chart values, not k8s objects
          #                              (e.g. deploy/30-demo/helm/values.yaml,
          #                              deploy/00-operators/helm/istio-ambient-values.yaml)
          #
          # Skipped kinds:
          #   OpenTelemetryCollector   — CRD allows `spec.config` as either
          #                              string (legacy inline) or object;
          #                              datreeio schema only accepts object.
          #                              The operator validates at admission
          #                              time, so we defer to it.
          mapfile -t files < <(find deploy/ -type f \( -name '*.yaml' -o -name '*.yml' \) \
            ! -name '*.snippet.yaml' \
            ! -path 'deploy/*/helm/*')
          echo "Validating ${#files[@]} files:"
          printf '  %s\n' "${files[@]}"
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -skip OpenTelemetryCollector \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            "${files[@]}"

  versions-check:
    name: versions-check (deploy/ + builder-config + Makefile vs VERSIONS.md)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run check-versions.sh
        run: bin/check-versions.sh

