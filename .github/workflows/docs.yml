name: Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build mkdocs site
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # mkdocs-material git-revision plugin needs history.

      # Gate first so we don't run setup-python (which fails on `cache: pip`
      # when no requirements.txt / pyproject.toml is present yet — ISI-693).
      - name: Bail out if mkdocs.yml missing
        id: check
        run: |
          if [ ! -f mkdocs.yml ]; then
            echo "::warning::mkdocs.yml not found — Content Writer still to seed it. Skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install mkdocs + plugins
        if: steps.check.outputs.skip == 'false'
        run: |
          python -m pip install --upgrade pip
          if [ -f docs/requirements.txt ]; then
            pip install -r docs/requirements.txt
          else
            pip install \
              mkdocs==1.6.1 \
              mkdocs-material==9.5.44 \
              mkdocs-git-revision-date-localized-plugin==1.2.9 \
              pymdown-extensions==10.11.2
          fi

      - name: Build site
        if: steps.check.outputs.skip == 'false'
        run: mkdocs build --strict --site-dir _site

      - name: Upload Pages artifact
        if: steps.check.outputs.skip == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.skip == 'false'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
