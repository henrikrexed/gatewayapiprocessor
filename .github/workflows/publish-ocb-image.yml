name: Publish OCB image (date-stamped pin)

# ---------------------------------------------------------------------------
# Demo-stack publish for the OCB-built collector image. The full release
# workflow (release.yml) gates on `v*` semver tags and produces the canonical
# multi-arch image + signed binaries + SBOM. This workflow is the lighter
# date-stamped variant the demo / workload cluster pins to:
#   ghcr.io/henrikrexed/otelcol-gatewayapi:YYYY-MM-DD
#
# Triggers
#   - push tags matching `ocb-*` (e.g. `ocb-2026-04-21`) — image tag is the
#     suffix after `ocb-`.
#   - workflow_dispatch with input `tag` — manual reruns / hotfixes without
#     a tag push.
#
# Image name mirrors release.yml so cluster CRs can pin to either alias.
# ---------------------------------------------------------------------------

on:
  push:
    tags:
      - 'ocb-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 2026-04-21). Required for manual runs.'
        type: string
        required: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_REGISTRY: ghcr.io/henrikrexed
  IMAGE_NAME: gatewayapiprocessor-collector
  ALIAS_IMAGE_NAME: otelcol-gatewayapi

concurrency:
  group: publish-ocb-${{ github.ref }}
  cancel-in-progress: false

jobs:
  binaries:
    name: Binary linux/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: gatewayapiprocessor/go.sum

      - name: Derive OCB version from builder-config.yaml
        id: ocb
        run: |
          OCB_VERSION=$(grep -E '^\s*version:' builder-config.yaml | head -1 | awk '{print $2}' | cut -d- -f1)
          echo "version=${OCB_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using OCB v${OCB_VERSION}"

      - name: Install OCB
        run: go install go.opentelemetry.io/collector/cmd/builder@v${{ steps.ocb.outputs.version }}

      - name: Cross-compile collector (linux/${{ matrix.goarch }})
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOFLAGS: '-trimpath'
        run: |
          builder --config=builder-config.yaml
          mkdir -p dist
          cp _build/otelcol-gatewayapi dist/otelcol-gatewayapi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-linux-${{ matrix.goarch }}
          path: dist/otelcol-gatewayapi
          retention-days: 7

  image:
    name: Multi-arch image (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    needs: binaries
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive image tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VAL="${{ github.event.inputs.tag }}"
          else
            # refs/tags/ocb-YYYY-MM-DD → YYYY-MM-DD
            VAL="${GITHUB_REF_NAME#ocb-}"
          fi
          if [ -z "$VAL" ] || [ "$VAL" = "${GITHUB_REF_NAME}" ]; then
            echo "could not derive image tag from event=${{ github.event_name }} ref=${GITHUB_REF_NAME} input=${{ github.event.inputs.tag || '' }}" >&2
            exit 1
          fi
          echo "value=${VAL}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${VAL}"

      - name: Download linux binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-linux-*
          path: tmp-binaries

      - name: Stage binaries for Dockerfile COPY
        run: |
          set -euxo pipefail
          mkdir -p dist/linux
          for dir in tmp-binaries/binary-linux-*; do
            [ -d "$dir" ] || continue
            arch="${dir##*binary-linux-}"   # e.g. amd64, arm64
            mkdir -p "dist/linux/${arch}"
            cp "$dir/otelcol-gatewayapi" "dist/linux/${arch}/otelcol-gatewayapi"
            chmod +x "dist/linux/${arch}/otelcol-gatewayapi"
          done
          ls -lhR dist/linux

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64, linux/arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.ALIAS_IMAGE_NAME }}:${{ steps.tag.outputs.value }}
          labels: |
            org.opencontainers.image.source=https://github.com/henrikrexed/gatewayapiprocessor
            org.opencontainers.image.description=OTel Collector with gatewayapiprocessor (date-stamped demo pin)
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=IsItObservable
            org.opencontainers.image.version=${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Print published image refs
        run: |
          echo "Published:"
          echo "  ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}"
          echo "  ${{ env.IMAGE_REGISTRY }}/${{ env.ALIAS_IMAGE_NAME }}:${{ steps.tag.outputs.value }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
