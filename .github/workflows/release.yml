name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  IMAGE_REGISTRY: ghcr.io/henrikrexed
  IMAGE_NAME: gatewayapiprocessor-collector
  ALIAS_IMAGE_NAME: otelcol-gatewayapi  # Makefile legacy alias — pushed too.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Cross-compile the OCB-produced collector binary for each target platform.
  # Each matrix entry produces one archive attached to the GitHub Release.
  # ---------------------------------------------------------------------------
  binaries:
    name: Binary ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: gatewayapiprocessor/go.sum

      - name: Derive OCB version from builder-config.yaml
        id: ocb
        run: |
          OCB_VERSION=$(grep -E '^\s*version:' builder-config.yaml | head -1 | awk '{print $2}' | cut -d- -f1)
          echo "version=${OCB_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using OCB v${OCB_VERSION}"

      - name: Install OCB
        run: go install go.opentelemetry.io/collector/cmd/builder@v${{ steps.ocb.outputs.version }}

      - name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOFLAGS: '-trimpath'
        run: |
          builder --config=builder-config.yaml
          mkdir -p dist
          BINARY="otelcol-gatewayapi${{ matrix.ext }}"
          cp _build/otelcol-gatewayapi${{ matrix.ext }} dist/${BINARY}

      - name: Package archive
        id: pack
        run: |
          cd dist
          VERSION="${GITHUB_REF_NAME}"
          BASE="otelcol-gatewayapi_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${BASE}.zip" "otelcol-gatewayapi${{ matrix.ext }}"
            sha256sum "${BASE}.zip" > "${BASE}.zip.sha256"
            echo "artifact=${BASE}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "${BASE}.tar.gz" "otelcol-gatewayapi${{ matrix.ext }}"
            sha256sum "${BASE}.tar.gz" > "${BASE}.tar.gz.sha256"
            echo "artifact=${BASE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi
          ls -lh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/otelcol-gatewayapi_*
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Multi-arch OCI image push to GHCR via buildx.
  # ---------------------------------------------------------------------------
  image:
    name: Multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.ALIAS_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/henrikrexed/gatewayapiprocessor
            org.opencontainers.image.description=OTel Collector with gatewayapiprocessor (ObsSummit NA 2026 demo)
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=IsItObservable
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push (linux/amd64, linux/arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ---------------------------------------------------------------------------
  # Image scan + SBOM generation for the release.
  # ---------------------------------------------------------------------------
  scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    needs: image
    steps:
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-sarif
          path: trivy-results.sarif
          retention-days: 30

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: image
    steps:
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Roll everything into the GitHub Release.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries, image, sbom]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-artifacts
          merge-multiple: true

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: release-artifacts

      - name: Generate changelog
        id: changelog
        run: |
          prev_tag=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          {
            echo "## ${GITHUB_REF_NAME}"
            echo ""
            echo "**Image:** \`${IMAGE_REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}\` (linux/amd64, linux/arm64)"
            echo ""
            echo "### Changes"
            if [ -n "$prev_tag" ]; then
              git log --pretty=format:'- %s (%h)' "${prev_tag}..${GITHUB_REF_NAME}"
            else
              git log --pretty=format:'- %s (%h)' "${GITHUB_REF_NAME}"
            fi
          } > CHANGELOG-RELEASE.md
          cat CHANGELOG-RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG-RELEASE.md
          files: |
            release-artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
