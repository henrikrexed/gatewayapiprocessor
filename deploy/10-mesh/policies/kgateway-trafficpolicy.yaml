# kgateway TrafficPolicy attachment demo (ISI-804, route names corrected in ISI-826).
#
# These policies attach to existing demo HTTPRoute objects via spec.targetRefs[].
# The collector's gatewayapiprocessor watches them through the dynamic policy
# informer wired up in ISI-804 and stamps every matched span/log/metric with
# parallel arrays:
#
#   k8s.gatewayapi.policy.names       = ["rate-limit-frontend"]
#   k8s.gatewayapi.policy.kinds       = ["TrafficPolicy"]
#   k8s.gatewayapi.policy.namespaces  = ["otel-demo"]
#   k8s.gatewayapi.policy.groups      = ["gateway.kgateway.dev"]
#   k8s.gatewayapi.policy.target_kind = "HTTPRoute"
#
# When two policies target the same route, the arrays grow to length 2 with
# element-wise correlated entries — index i of every list describes the same
# policy. This is the contract Henrik approved on ISI-804 (2026-04-27): no
# policy.uid, just name + CRD identity, low cardinality, queryable.
#
# Talk demo beat: apply this manifest mid-talk, refresh Grail, watch the
# policy attribution surface on hero spans without restarting the collector.
#
# Why HTTPRoute-only here:
#   The kgateway v1alpha1 TrafficPolicy schema rejects GRPCRoute targets — its
#   spec.targetRefs validator only accepts Gateway / HTTPRoute / XListenerSet /
#   Backend (kgateway 2.x admission webhook, confirmed on observable-gateapiprocess
#   2026-04-27 during ISI-826 validation). The processor itself enriches GRPCRoute
#   spans correctly when a policy CRD that *does* allow GRPCRoute targets attaches
#   to one (e.g. Envoy Gateway BackendTrafficPolicy) — that path is locked in by
#   the unit test TestEnrichment_Policy_GRPCRouteTargetKind in
#   gatewayapiprocessor/processor_policy_test.go.
#
# Cluster route names that exist on the demo deployment (otel-demo namespace):
#   - HTTPRoute  oteldemo-ingress-route   (ingress-bound, parentRef = Gateway)
#   - HTTPRoute  frontend-proxy-mesh      (mesh-bound, GAMMA, parentRef.kind=Service)
#   - GRPCRoute  frontend-to-cart / frontend-to-checkout / frontend-to-product-catalog
#
# References:
#   - kgateway.dev/docs/concepts/traffic-management/trafficpolicy/
#   - gateway-api.sigs.k8s.io/reference/policy-attachment/
#   - ISI-804: https://paperclip.isitobservable.com/ISI/issues/ISI-804
#   - ISI-826: https://paperclip.isitobservable.com/ISI/issues/ISI-826

# ---------------------------------------------------------------------------
# Policy 1 — rate limit on the ingress HTTPRoute `oteldemo-ingress-route`.
# Stamps every span on the ingress path with the policy attribution.
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: rate-limit-frontend
  namespace: otel-demo
  labels:
    app.kubernetes.io/part-of: otel-demo
    demo.isitobservable.com/policy-kind: ratelimit
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: oteldemo-ingress-route
  rateLimit:
    local:
      tokenBucket:
        # 50 req/s, burst 100. Visible in Grail as 429s on the
        # oteldemo-ingress-route spans plus the new policy.* attribution.
        maxTokens: 100
        tokensPerFill: 50
        fillInterval: 1s

# ---------------------------------------------------------------------------
# Policy 2 — retry policy on the same HTTPRoute `oteldemo-ingress-route`.
# Demonstrates the multi-policy stamp: arrays length 2 with element-wise
# correlated entries (index 0 = rate-limit, index 1 = retry).
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: retries-frontend
  namespace: otel-demo
  labels:
    app.kubernetes.io/part-of: otel-demo
    demo.isitobservable.com/policy-kind: retry
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: oteldemo-ingress-route
  retry:
    attempts: 3
    perTryTimeout: 2s
    retryOn:
      - 5xx
      - reset

# ---------------------------------------------------------------------------
# (Removed) Policy 3 — kgateway v1alpha1 TrafficPolicy targeting a GRPCRoute.
#
# Removed in ISI-826 because the kgateway admission webhook rejects GRPCRoute
# in spec.targetRefs:
#
#   The TrafficPolicy "rate-limit-cart-grpc" is invalid:
#   spec.targetRefs: Invalid value: targetRefs may only reference
#   Gateway, HTTPRoute, XListenerSet, or Backend resources
#
# The processor's GRPCRoute target_kind enrichment path is unchanged and is
# locked in by TestEnrichment_Policy_GRPCRouteTargetKind in
# gatewayapiprocessor/processor_policy_test.go — that unit test exercises the
# attribution path with a synthetic GRPCRoute-targeted policy independent of
# any specific CRD's schema.
#
# To exercise GRPCRoute target_kind on a live cluster, use a policy CRD whose
# schema accepts GRPCRoute targets (e.g. Envoy Gateway BackendTrafficPolicy).
