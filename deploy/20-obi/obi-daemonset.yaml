# OBI (opentelemetry-ebpf-instrumentation) — pinned v0.8.0.
# Kernel-side eBPF auto-instrumentation; carries k8s.pod.*/k8s.node.* via
# its k8s metadata enrichment so the processor can correlate with HTTPRoute
# bindings.
#
# Topology (ISI-836 follow-up; aligning manifest to live observable-gateapiprocess):
#   - The kind demo cluster uses `deploy/40-collector/` (gateway-only mode).
#   - The `observable-gateapiprocess` ClusterAPI cluster uses the split-topology
#     in `deploy/k8s/collector/` (per-node `otelcol-agent` DaemonSet + 2-replica
#     `otelcol-gateway` Deployment), per `deploy/k8s/collector/README.md` and
#     ISI-754 / ISI-749. OBI is per-node (DaemonSet), so it ships to the LOCAL
#     agent collector — that gives us trace-ID-affinity load balancing into the
#     gateway tier where tail sampling lives, without OBI needing to know about
#     the gateway pods.
#   - Live verification (kubectl get svc -n otel-system) shows the agent's
#     Service is `otelcol-agent-collector.otel-system.svc.cluster.local`
#     (port 4317 OTLP gRPC). The gateway Service `otelcol-collector` exists
#     too, but ALL OBI traffic should land at the agent first.
#
# Image pin (ISI-836 follow-up):
#   - OBI v0.8.0 ships as `otel/ebpf-instrument:v0.8.0` on Docker Hub.
#     `otel/opentelemetry-ebpf-instrumentation` does NOT exist as a published
#     image; using it caused live ImagePullBackOff and the cluster operator
#     hand-patched the DaemonSet to the correct name. Aligning the repo here
#     so future `kubectl apply -f deploy/20-obi/` does not regress.
#
# Export wiring:
#   - Per OBI export-data docs (https://opentelemetry.io/docs/zero-code/obi/configure/export-data/),
#     a single `OTEL_EXPORTER_OTLP_ENDPOINT` enables traces + metrics. OBI does
#     NOT emit application logs (no logs export page exists for v0.8.0); the
#     board's "logs" leg of the ask needs a filelog/k8s-log source on a
#     separate ticket.
#   - `OTEL_EBPF_METRICS_FEATURES=network,application` matches the live
#     operator choice. `network` adds per-flow cardinality, but the agent-tier
#     k8sattributes + tail-sampling chain absorbs it before it reaches the
#     gateway. Add `application_span` / `application_service_graph` only after
#     a sizing review.
#   - `OTEL_EBPF_*_INSTRUMENTATIONS=*` mirrors the live wildcard; trims to a
#     comma list only if a specific protocol becomes a CPU hot spot.
#   - `OTEL_EBPF_KUBE_CLUSTER_NAME=observable-gateapiprocess` stamps the
#     cluster identity on every span/metric so Dynatrace can scope queries
#     by cluster (the resource-cluster-id snippet at the agent tier expects
#     this attribute to already be present on OBI signals).
#   - Switched BEYLA_* -> OTEL_EBPF_* (OBI v0.8.0 documents OTEL_EBPF_;
#     BEYLA_ prefix is undocumented for this version).
---
apiVersion: v1
kind: Namespace
metadata:
  name: obi-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: obi
  namespace: obi-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: obi
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "replicationcontrollers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: obi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: obi
subjects:
  - kind: ServiceAccount
    name: obi
    namespace: obi-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: obi
  namespace: obi-system
  labels:
    app.kubernetes.io/name: obi
    app.kubernetes.io/version: v0.8.0
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: obi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obi
    spec:
      serviceAccountName: obi
      hostPID: true
      hostNetwork: true
      containers:
        - name: obi
          # Canonical OBI image on Docker Hub. See file header for why the
          # previous `otel/opentelemetry-ebpf-instrumentation:v0.8.0` did not
          # exist and got hand-patched on the live cluster.
          image: otel/ebpf-instrument:v0.8.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RESOURCE
                - BPF
                - PERFMON
          env:
            # Ship to the per-node agent collector (split-topology lives in
            # deploy/k8s/collector/, see file header). The agent does
            # k8sattributes + trace-ID-affinity load balancing into the
            # gateway tier where tail sampling lives.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otelcol-agent-collector.otel-system.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_SERVICE_NAME
              value: "obi"
            # Cluster-id stamp expected by the agent's resource processor;
            # without it Dynatrace can't scope queries to this cluster.
            - name: OTEL_EBPF_KUBE_CLUSTER_NAME
              value: "observable-gateapiprocess"
            # Wildcard instrumentations match the live operator setting and
            # capture every OBI-supported protocol (http, grpc, sql, redis,
            # kafka, mqtt, couchbase, genai, gpu, mongo, dns). Narrow this
            # only if a specific protocol becomes a CPU hot spot.
            - name: OTEL_EBPF_TRACES_INSTRUMENTATIONS
              value: "*"
            - name: OTEL_EBPF_METRICS_INSTRUMENTATIONS
              value: "*"
            # `application` = HTTP/gRPC RED summaries; `network` = per-flow
            # network metrics from the OBI Flows agent. Tail sampling at the
            # gateway tier absorbs the cardinality. Span-derived metrics and
            # service-graph features stay off pending sizing review.
            - name: OTEL_EBPF_METRICS_FEATURES
              value: "network,application"
            # K8s metadata enrichment + discovery cadence (OBI v0.8.0 prefix).
            - name: OTEL_EBPF_KUBE_METADATA_ENABLE
              value: "true"
            - name: OTEL_EBPF_DISCOVERY_POLL_INTERVAL
              value: "5s"
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: proc
          hostPath:
            path: /proc
