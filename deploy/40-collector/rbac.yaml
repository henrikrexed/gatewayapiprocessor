# RBAC for the custom OTel Collector running gatewayapiprocessor.
# Informers need: get/list/watch on Gateway, HTTPRoute, GRPCRoute, GatewayClass.
# Plus k8sattributes needs: get/list/watch on pods/namespaces/nodes.
---
apiVersion: v1
kind: Namespace
metadata:
  name: otel-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otelcol
  namespace: otel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otelcol-gatewayapi
rules:
  # gatewayapiprocessor informers
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - httproutes
      - grpcroutes
      - gatewayclasses
    verbs: ["get", "list", "watch"]
  # k8sattributes processor
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # Optional emit_status_conditions reads
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways/status
      - httproutes/status
      - grpcroutes/status
    verbs: ["get", "list", "watch"]
  # Policy attachment enrichment (ISI-804). The dynamic informer reads each
  # configured policy CRD; spec.targetRefs[] is projected onto the route
  # index. /status reads are also list/watched so the Accepted=True gate
  # works (mirrors the route-status pattern above). Additional CRDs go here
  # as `watch.policies` grows — keep the verbs list/watch only, never
  # create/update/delete.
  - apiGroups: ["gateway.kgateway.dev"]
    resources:
      - trafficpolicies
      - trafficpolicies/status
      - backendconfigpolicies
      - backendconfigpolicies/status
      - httplistenerpolicies
      - httplistenerpolicies/status
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otelcol-gatewayapi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otelcol-gatewayapi
subjects:
  - kind: ServiceAccount
    name: otelcol
    namespace: otel-system
