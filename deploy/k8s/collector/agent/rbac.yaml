# Agent-tier RBAC.
#
# Scope is intentionally minimal vs. the gateway tier:
#
#   * k8sattributesprocessor reads pods/namespaces/nodes (+ owner refs
#     via apps/* kinds) — required, this is the whole reason the
#     enrichment is at the agent.
#   * loadbalancingexporter k8s resolver reads endpoints/endpointslices/services
#     in the gateway-collector namespace to discover the gateway pods.
#     v0.150.0 watches EndpointSlices (discovery.k8s.io/v1) preferentially
#     over the legacy core/v1 Endpoints API.
#   * NO Gateway-API verbs here — gatewayapiprocessor runs ONLY at the
#     gateway (ISI-754 invariant). A single cluster-scoped LIST/WATCH
#     on Gateway/HTTPRoute is the whole point of the split.
#   * NO read on Secret/dt-otlp-ingest — agents never see the DT token.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otelcol-agent
  namespace: otel-system
  labels:
    app.kubernetes.io/component: otel-agent
    app.kubernetes.io/part-of: gatewayapiprocessor
    isi.observable/cluster: clusterapi-isi-01
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otelcol-agent
  labels:
    app.kubernetes.io/component: otel-agent
    app.kubernetes.io/part-of: gatewayapiprocessor
rules:
  # k8sattributesprocessor — node-local pod metadata enrichment.
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # filelogreceiver reads container log file metadata via the kubelet API.
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otelcol-agent
  labels:
    app.kubernetes.io/component: otel-agent
    app.kubernetes.io/part-of: gatewayapiprocessor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otelcol-agent
subjects:
  - kind: ServiceAccount
    name: otelcol-agent
    namespace: otel-system
---
# loadbalancingexporter k8s resolver scope — namespaced to
# gateway-collector. LIST/WATCH only in that namespace, nothing wider.
#
# OTel collector v0.150.0 watches EndpointSlices (discovery.k8s.io/v1)
# instead of the legacy core/v1 Endpoints API. Without the
# discovery.k8s.io rule below the resolver spins forever logging
# `endpointslices.discovery.k8s.io is forbidden` and the gateway never
# becomes addressable from agents (telemetry queues + drops). The
# legacy core/v1 endpoints rule stays in place for back-compat with
# any older collector version that still falls back to it.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: otelcol-agent-gateway-resolver
  namespace: gateway-collector
  labels:
    app.kubernetes.io/component: otel-agent
    app.kubernetes.io/part-of: gatewayapiprocessor
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: otelcol-agent-gateway-resolver
  namespace: gateway-collector
  labels:
    app.kubernetes.io/component: otel-agent
    app.kubernetes.io/part-of: gatewayapiprocessor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: otelcol-agent-gateway-resolver
subjects:
  - kind: ServiceAccount
    name: otelcol-agent
    namespace: otel-system
