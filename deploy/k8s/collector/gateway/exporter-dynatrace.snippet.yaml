# Dynatrace OTLP/HTTP exporter — fragment for the gateway-tier
# OpenTelemetryCollector CR. Merge into the gateway collector's
# `config:` block when ISI-754 lands the full agent + gateway split.
#
# Why otlphttp (not otlp/grpc):
#   - Dynatrace's OTLP receiver is HTTP-only on `/api/v2/otlp/v1/...`.
#   - HTTP is friendlier to corporate egress proxies than gRPC.
#   - Compression: gzip is a meaningful saving on logs and trace bursts;
#     no gain on the wire is worth losing it.
#
# Endpoint + token come from the dt-otlp-ingest Secret in the
# gateway-collector namespace — see deploy/k8s/dynatrace/. Never inline
# either value here.
exporters:
  otlphttp/dynatrace:
    endpoint: ${env:DT_TENANT_URL}/api/v2/otlp
    headers:
      Authorization: "Api-Token ${env:DT_TOKEN}"
    compression: gzip
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    tls:
      insecure: false
