# Dynatrace Grail bucket scoped to clusterapi-isi-01 logs.
#
# Why a per-cluster bucket (and not just a filter):
#   - Retention is a property of the bucket, not the query. We want
#     35d here while the demo cluster's logs may live in default_logs
#     with shorter or longer retention. Per-cluster bucket lets us
#     change retention without touching default_logs.
#   - IAM scopes work cleanly on a bucket boundary — see
#     iam-policy-clusterapi-isi-01.yaml. A filter-segment alone cannot
#     enforce read isolation.
#   - On Grail tenants, the classic "Management Zone" concept
#     decomposes into: bucket (storage scope) + filter segment
#     (UI scope) + IAM policy (access scope). All three are required
#     to satisfy ISI-749 §6.3 / obs-annex §D's per-cluster boundary.
#
# Apply with (requires DT scope `storage:bucket-definitions:write`):
#   dtctl apply -f bucket-logs-clusterapi-isi-01.yaml
#
# This token's scope on the dev tenant lacks bucket-write — see
# README.md "Open handoffs" for who owns the apply step.
bucketName: logs_clusterapi_isi_01
table: logs
displayName: "Logs — clusterapi-isi-01 (ISI-755)"
retentionDays: 35
