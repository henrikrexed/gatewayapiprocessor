# IAM policy that scopes read access to clusterapi-isi-01 data.
#
# This is the third leg of the per-cluster boundary (after bucket and
# filter segment). Without an IAM policy, anyone with default tenant
# access can still read the bucket — the bucket is a storage boundary,
# not an access one.
#
# Two policy statements:
#   1. allow-read-cluster-logs — grants storage:logs:read on the
#      per-cluster bucket only.
#   2. allow-read-cluster-spans — grants storage:spans:read on
#      default_spans BUT scoped by the filter segment so non-cluster
#      spans are not visible.
#
# This file is a TEMPLATE — bind it to a group in the IAM UI or via
# a separate dtctl `apply` against the IAM admin endpoint. dtctl v0.23
# does not yet expose IAM policy as a first-class settings schema, so
# the apply step is currently manual via the Account Management API.
#
# References:
#   - https://docs.dynatrace.com/docs/manage/identity-access-management/permission-management/iam-policy-management
#   - obs-annex §D (ISI-749) — per-cluster RBAC requirement
---
name: "clusterapi-isi-01-readonly"
description: "Read-only access to clusterapi-isi-01 telemetry (ISI-755)"
statements:
  - effect: ALLOW
    actions:
      - storage:logs:read
    resources:
      - "buckets:logs_clusterapi_isi_01"

  - effect: ALLOW
    actions:
      - storage:spans:read
      - storage:metrics:read
      - storage:events:read
      - storage:bizevents:read
    resources:
      - "*"
    conditions:
      # Filter-segment-equivalent constraint applied at IAM level so
      # default_spans / default_metrics queries cannot leak data from
      # other clusters.
      - 'attribute("k8s.cluster.name") == "clusterapi-isi-01"'
