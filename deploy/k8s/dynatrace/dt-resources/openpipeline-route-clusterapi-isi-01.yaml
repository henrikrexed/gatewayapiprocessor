# OpenPipeline routing rule that lands logs from clusterapi-isi-01 in
# the per-cluster bucket created by bucket-logs-clusterapi-isi-01.yaml.
#
# Without this rule the bucket exists but stays empty — Grail routes
# everything to default_logs unless an OpenPipeline rule diverts it.
#
# Apply with (requires DT scope `settings:objects:write` on
# `builtin:openpipeline.logs.pipelines`):
#   dtctl apply -f openpipeline-route-clusterapi-isi-01.yaml
#
# This is a Settings 2.0 object. The exact schema field names below
# follow the v0.23 dtctl `dtctl describe settings-schema
# builtin:openpipeline.logs.pipelines` output — confirm before apply
# in case the schema has shifted between dtctl versions.
schemaId: builtin:openpipeline.logs.pipelines
scope: environment
value:
  pipelineId: clusterapi-isi-01-logs
  displayName: "clusterapi-isi-01 logs → logs_clusterapi_isi_01"
  enabled: true
  matchers:
    # Routes only logs whose resource attribute carries the cluster
    # tag. The agent (DaemonSet) layer stamps this attribute via the
    # `resource` processor in the OTel Collector — see
    # deploy/k8s/collector/agent/* once ISI-754 lands.
    - matcher: 'matchesValue(resource.attributes["k8s.cluster.name"], "clusterapi-isi-01")'
  processors: []
  storage:
    catchAllBucketName: logs_clusterapi_isi_01
