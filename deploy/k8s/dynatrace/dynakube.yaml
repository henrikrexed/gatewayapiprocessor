---
# DynaKube CR for the gatewayapiprocessor demo cluster.
#
# Architecture (per deploy/k8s/dynatrace/README.md):
#   • Workload telemetry from `otel-demo` flows OTel SDK → otelcol-agent →
#     otelcol-gateway → Dynatrace OTLP. NO OneAgent code-module injection
#     into `otel-demo` — that would double-instrument every SDK app.
#   • `oneAgent.applicationMonitoring.namespaceSelector` is therefore an
#     opt-in label gate. A namespace ONLY receives code-module injection
#     when it carries `oneagent=true`. Demo namespaces stay unlabeled.
#   • ActiveGate handles Kubernetes API monitoring + smartscape; that path
#     does not depend on per-pod injection.
#
# Apply order: AFTER the dynatrace-operator + Helm install, BEFORE the
# otelcol agent + gateway in deploy/k8s/collector/.
#
# Secrets (ingest token, ActiveGate auth token) are managed separately —
# see api-token-spec.md and the dynatrace-operator install docs.
apiVersion: dynatrace.com/v1beta5
kind: DynaKube
metadata:
  name: dynakube
  namespace: dynatrace
  annotations:
    feature.dynatrace.com/automatic-kubernetes-api-monitoring: "true"
    feature.dynatrace.com/automatic-kubernetes-api-monitoring-cluster-name: "observable-gateapiprocess"
    feature.dynatrace.com/k8s-app-enabled: "true"
    feature.dynatrace.com/label-version-detection: "true"
spec:
  # Tenant URL is environment-specific. Replace <env-id> at deploy time
  # (or template via kustomize/sealed-secret). Scrubbed here per the same
  # convention as deploy/k8s/dynatrace/README.md and PR #35.
  apiUrl: https://<env-id>.live.dynatrace.com/api

  metadataEnrichment:
    enabled: true

  activeGate:
    capabilities:
      - routing
      - kubernetes-monitoring
      - dynatrace-api
      - metrics-ingest
    customProperties:
      value: |
        [kubernetes_monitoring]
        smartscape_pipeline_enabled = true
    resources:
      limits:
        cpu: "1000m"
        memory: 1.5Gi
      requests:
        cpu: "250m"
        memory: 512Mi

  oneAgent:
    # Opt-in code-module injection. A namespace receives OneAgent
    # injection ONLY when it is labeled `oneagent=true`. The demo
    # namespaces (otel-demo, gateway-collector, otel-system, obi-system)
    # MUST NOT carry this label — they rely on OTel SDK + OTLP gateway
    # path. Adding the label there would re-introduce the double-
    # instrumentation flagged on ISI-680 (board comment 2026-04-26
    # 15:44Z).
    applicationMonitoring:
      namespaceSelector:
        matchLabels:
          oneagent: "true"
