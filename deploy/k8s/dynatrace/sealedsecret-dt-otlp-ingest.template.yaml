# SealedSecret template — ONLY checked into git AFTER `kubeseal` has
# encrypted the values. The placeholder below is a literal "REPLACE_ME"
# string so applying this file as-is does nothing useful — it's a
# reminder of the expected shape, not a real sealed secret.
#
# Workflow (one-time, by ProxOps with cluster + DT credentials):
#
#   1. Create the raw Secret locally (do NOT apply, do NOT commit):
#        kubectl create secret generic dt-otlp-ingest \
#          --namespace gateway-collector \
#          --from-literal=endpoint="$DT_ENDPOINT" \
#          --from-literal=api-token="$DT_TOKEN" \
#          --dry-run=client -o yaml > /tmp/secret.yaml
#
#   2. Seal it against the cluster's sealed-secrets controller:
#        kubeseal --controller-namespace kube-system \
#          --controller-name sealed-secrets \
#          --format yaml \
#          < /tmp/secret.yaml \
#          > deploy/k8s/dynatrace/sealedsecret-dt-otlp-ingest.yaml
#
#   3. Verify, commit the *sealed* file (not /tmp/secret.yaml):
#        kubeseal --validate \
#          < deploy/k8s/dynatrace/sealedsecret-dt-otlp-ingest.yaml
#        git add deploy/k8s/dynatrace/sealedsecret-dt-otlp-ingest.yaml
#
# The committed file MUST NOT contain the literal token. It contains
# only ciphertext that only the cluster's sealed-secrets controller can
# decrypt — safe to keep in git.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: dt-otlp-ingest
  namespace: gateway-collector
spec:
  encryptedData:
    endpoint: REPLACE_ME_AFTER_KUBESEAL
    api-token: REPLACE_ME_AFTER_KUBESEAL
  template:
    metadata:
      name: dt-otlp-ingest
      namespace: gateway-collector
      labels:
        app.kubernetes.io/component: otel-gateway
        app.kubernetes.io/part-of: gatewayapiprocessor
        isi.observable/cluster: clusterapi-isi-01
    type: Opaque
