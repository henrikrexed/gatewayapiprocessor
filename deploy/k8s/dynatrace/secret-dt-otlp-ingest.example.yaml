# EXAMPLE — DO NOT COMMIT REAL TOKEN VALUES.
#
# This file documents the shape of the Secret the gateway collector
# expects. The keys (`endpoint`, `api-token`) match the convention
# already used in deploy/40-collector/collector.yaml so the existing
# OpenTelemetryCollector CR can consume this Secret unchanged.
#
# To materialize on the cluster (one-time, by ProxOps or operator with
# DT token-management scope):
#
#   DT_ENDPOINT='https://<env-id>.live.dynatrace.com/api/v2/otlp'
#   DT_TOKEN='dt0c01.XXXXXXXX....'   # see ISI-755 issuance runbook
#   kubectl create namespace gateway-collector --dry-run=client -o yaml | kubectl apply -f -
#   kubectl -n gateway-collector create secret generic dt-otlp-ingest \
#     --from-literal=endpoint="$DT_ENDPOINT" \
#     --from-literal=api-token="$DT_TOKEN"
#
# If you use SealedSecrets, encrypt instead — see
# sealedsecret-dt-otlp-ingest.template.yaml in this directory.
#
# Token scopes required (least privilege, per obs-annex §D):
#   - openTelemetryTrace.ingest
#   - metrics.ingest
#   - logs.ingest
# Reject any token with broader scopes (e.g. apiTokens.read,
# settings.write, entities.read) — those belong on a separate admin
# token, not on the ingest path.
apiVersion: v1
kind: Secret
metadata:
  name: dt-otlp-ingest
  namespace: gateway-collector
  labels:
    app.kubernetes.io/component: otel-gateway
    app.kubernetes.io/part-of: gatewayapiprocessor
    isi.observable/cluster: clusterapi-isi-01
type: Opaque
stringData:
  endpoint: "REPLACE_ME_https://<env-id>.live.dynatrace.com/api/v2/otlp"
  api-token: "REPLACE_ME_dt0c01.xxxxxxxx"
