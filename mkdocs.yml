site_name: gatewayapiprocessor
site_description: >-
  Kubernetes-aware OpenTelemetry Collector processor that normalizes Gateway
  API route identity — k8s.gateway.*, k8s.httproute.*, k8s.gatewayclass.* —
  across Envoy Gateway, Kgateway, Istio ambient, and Linkerd.
site_url: https://henrikrexed.github.io/gatewayapiprocessor/
site_author: Henrik Rexed
repo_url: https://github.com/henrikrexed/gatewayapiprocessor
repo_name: henrikrexed/gatewayapiprocessor
edit_uri: edit/main/docs/
copyright: >-
  Copyright © 2026 Henrik Rexed — Apache-2.0.
  Demo artifact for ObsSummit NA 2026 "The Legend of Config: Breath of the Cluster".

theme:
  name: material
  language: en
  # Dark-mode first per task brief. Light toggle available for accessibility.
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/henrikrexed/gatewayapiprocessor
    - icon: fontawesome/brands/mastodon
      link: https://hachyderm.io/@henrikrexed
  generator: false

nav:
  - Home: index.md
  - Getting started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Minimum viable pipeline: getting-started/minimum-viable-pipeline.md
      - Verification: getting-started/verification.md
  - Configuration:
      - configuration/index.md
      - Envoy-family parser: configuration/parser-envoy.md
      - Linkerd parser: configuration/parser-linkerd.md
      - Passthrough parser: configuration/parser-passthrough.md
  - Attribute reference: attribute-reference/index.md
  - How it works: how-it-works/index.md
  - Troubleshooting: troubleshooting/index.md
  - Roadmap: roadmap/index.md
